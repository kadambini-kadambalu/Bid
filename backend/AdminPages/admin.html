<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Auction Admin Panel</h2>

Item:
<input id="item">

Price:
<input id="price">

<button onclick="sendAuction()">Start Auction</button>

<script>

const socket = new WebSocket("ws://172.74.0.56:3000");

function sendAuction(){

    const item = document.getElementById("item").value;
    const price = document.getElementById("price").value;

    const data = {
        type:"auction",
        item:item,
        price:price
    }

    socket.send(JSON.stringify(data))
}

</script>
</body>
</html>
